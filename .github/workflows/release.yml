name: Build and Release

on:
  push:
    branches:
      - main # Ou le nom de ta branche principale

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Nécessaire pour comparer avec le commit précédent

      - name: Check version change
        id: check_version
        run: |
          # Récupère la version actuelle et la précédente
          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION=$(git show HEAD^1:package.json | node -p "JSON.parse(process.stdin.read()).version" 2>/dev/null || echo "0.0.0")

          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_version.outputs.version_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ajuste selon ta version d'Adonis
          cache: 'npm'

      - name: Install dependencies
        if: steps.check_version.outputs.version_changed == 'true'
        run: npm ci

      - name: Build project
        if: steps.check_version.outputs.version_changed == 'true'
        run: npm run build

      - name: Zip Build
        if: steps.check_version.outputs.version_changed == 'true'
        run: zip -r build-v${{ steps.check_version.outputs.new_version }}.zip build/

      - name: Create Release
        if: steps.check_version.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_version.outputs.new_version }}
          name: Release v${{ steps.check_version.outputs.new_version }}
          files: build-v${{ steps.check_version.outputs.new_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
