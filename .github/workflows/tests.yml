name: CI Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        env:
            NODE_ENV: test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test
